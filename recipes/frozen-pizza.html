      <figure>
         <img src="https://d2lnr5mha7bycj.cloudfront.net/product-image/file/large_ee724a0e-b009-4c9e-8c7b-3126a8113a86.jpg" alt="A flatbread chicken bacon ranch pizza in the box"> 
         <h2>Description</h2>
         <p><em>The</em> frozen pizza is another one of those staples in the world of the middle class diet. Sure, maybe it is not the healthiest option (depending on brand / ingredients) but what better choice when you are on a budget and it's 9:00pm and you have not eaten dinner yet? Having one of these bad boys chilling in the fridge or freezer is (in most situations) clutch.</p>
    <h3>Ingredients</h3>
    <p>This section should be obvious because this recipe is not really a recipe. Any pre made frozen pizza will do. There are different brands that could be had but I suppose it depends on location. I typically choose an <a href="https://www.aldi.us/store/aldi/storefront" target="_blank">Aldi</a> pizza. I recommend their one of their <a href="https://www.aldi.us/store/aldi/products/46122219-mama-cozzi-s-pizza-kitchen-red-bag-chicken-bacon-ranch-flatbread-13-9-oz?srsltid=AfmBOoof1E816v3DJbTa34nax0mQCy0deg4SoGPWDxDOCsWGhNytcA5o" target="_blank">flatbread pizzas</a>.</p>
      <ul>
        <li>Frozen Pizza</li>
      </ul>
        <h3>Steps:</h3>
      <ol>
        <li>Pre-heat the oven (reccomended to use the temp provided on the packaging)</li>
        <li>Place in the oven once pre-heated.</li>
        <li>Pull it out of the oven and let it sit for about 2 minutes. This step is VERY important as to get the best cut.</li>
        <li>Depending on the shape of the pizza cut it into eighths.</li>
      </ol>
      <h4>Optional Steps:</h4>
      <ol>
        <li>You could also throw it in the oven before it is pre-heated which can flash the crust and make it a bit more "crispy". You should know this could change your cook times and may affect the process requiring you to broil the top if it is not done by the time the bottom is.</li>
      </ol>
